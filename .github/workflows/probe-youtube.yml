name: Probe YouTube (Diagnostic)

# 진단 전용 — GH Actions 러너 IP 에서 oEmbed / yt_dlp / youtube-transcript-api
# 가 어떤 패턴으로 차단되는지 매트릭스 비교. 검증 끝나면 별도 PR 로 제거 예정.
# nightly 와 분리: workflow_dispatch 만, schedule 없음.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout wiki-agent
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Install dependencies
        run: uv sync

      - name: Probe oEmbed + yt_dlp + youtube-transcript-api
        run: |
          uv run python - <<'PY'
          import json
          import subprocess
          import urllib.request
          import urllib.error

          # 차단 재현 영상(오늘 fail) + control 영상(공개·항상 통함)
          VIDEOS = [
              ("Pd-2F2gZoH8", "blocked"),
              ("dQw4w9WgXcQ", "control"),
          ]
          UA = (
              "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 "
              "(KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          )

          summary = {"oembed": {}, "yt_dlp": {}, "transcript": {}}

          # 1) oEmbed -- 핵심 검증 대상
          for vid, _ in VIDEOS:
              print(f"=== oEmbed | {vid} ===", flush=True)
              url = (
                  "https://www.youtube.com/oembed?"
                  f"url=https://www.youtube.com/watch?v={vid}&format=json"
              )
              req = urllib.request.Request(url, headers={"User-Agent": UA})
              try:
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      status = resp.status
                      body = resp.read().decode("utf-8", errors="replace")
                  print(f"HTTP {status}")
                  print(body[:500])
                  summary["oembed"][vid] = "ok" if status == 200 else f"HTTP{status}"
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", errors="replace")[:500]
                  print(f"HTTP {e.code}")
                  print(body)
                  summary["oembed"][vid] = f"HTTP{e.code}"
              except Exception as e:  # noqa: BLE001
                  print(f"ERROR {type(e).__name__}: {e}")
                  summary["oembed"][vid] = f"ERR:{type(e).__name__}"
              print(flush=True)

          # 2) yt_dlp 메타
          for vid, _ in VIDEOS:
              print(f"=== yt_dlp | {vid} ===", flush=True)
              url = f"https://www.youtube.com/watch?v={vid}"
              proc = subprocess.run(
                  [
                      "uv", "run", "yt-dlp",
                      "--skip-download",
                      "--no-warnings",
                      "--print", "%(title)s|%(channel)s",
                      url,
                  ],
                  capture_output=True,
                  text=True,
                  timeout=60,
              )
              print(f"exit={proc.returncode}")
              if proc.stdout:
                  print(proc.stdout.strip())
              if proc.returncode != 0:
                  err_lines = (proc.stderr or "").strip().splitlines()
                  for line in err_lines[-5:]:
                      print(line)
                  summary["yt_dlp"][vid] = "BLOCKED"
              else:
                  summary["yt_dlp"][vid] = "ok"
              print(flush=True)

          # 3) youtube-transcript-api
          for vid, _ in VIDEOS:
              print(f"=== transcript | {vid} ===", flush=True)
              try:
                  from youtube_transcript_api import YouTubeTranscriptApi
                  api = YouTubeTranscriptApi()
                  listing = api.list(vid)
                  langs = []
                  for t in listing:
                      tag = "auto" if getattr(t, "is_generated", False) else "manual"
                      langs.append(f"{t.language_code}({tag})")
                  print(f"languages: {langs}")
                  summary["transcript"][vid] = "ok"
              except Exception as e:  # noqa: BLE001
                  print(f"ERROR {type(e).__name__}: {e}")
                  summary["transcript"][vid] = f"BLOCKED:{type(e).__name__}"
              print(flush=True)

          # 4) SUMMARY
          def fmt(d):
              return ", ".join(
                  f"{'Pd' if k == 'Pd-2F2gZoH8' else 'dQ'}={v}"
                  for k, v in d.items()
              )

          print("=== SUMMARY ===")
          print(f"oEmbed:     {fmt(summary['oembed'])}")
          print(f"yt_dlp:     {fmt(summary['yt_dlp'])}")
          print(f"transcript: {fmt(summary['transcript'])}")
          print()
          print("RAW:", json.dumps(summary, ensure_ascii=False))
          PY
