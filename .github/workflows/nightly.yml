name: Nightly Wiki Agent

on:
  schedule:
    # KST 07:30 = UTC 22:30 (전날)
    - cron: '30 22 * * *'
  workflow_dispatch:     # 수동 실행 버튼
    inputs:
      force_curator:
        description: 'Curator 강제 실행'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (파일·이슈 변경 없음)'
        type: boolean
        default: false

permissions:
  contents: read         # 자기 repo (wiki-agent) 읽기

concurrency:
  group: nightly
  cancel-in-progress: false   # 동시 실행 방지, 실행 중이면 다음은 대기

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      WIKI_REPO_TOKEN: ${{ secrets.WIKI_REPO_TOKEN }}
      GITHUB_WIKI_REPO: ${{ vars.GITHUB_WIKI_REPO || 'aejinyoo/wiki' }}
      INBOX_LABEL: ${{ vars.INBOX_LABEL || 'inbox' }}
      MODEL_HAIKU: gemini-2.5-flash-lite
      MODEL_SONNET: gemini-2.5-pro
      DAILY_TOKEN_CAP_SONNET: '25000'
      DAILY_TOKEN_CAP_HAIKU: '25000'
      CLASSIFIER_DAILY_ITEM_CAP: '30'
      LOG_LEVEL: INFO
      TZ: Asia/Seoul

    steps:
      - name: Checkout wiki-agent (code)
        uses: actions/checkout@v4
        with:
          path: wiki-agent
          # 기본 GITHUB_TOKEN 을 git config 에 저장하지 않음.
          # 저장되면 keepalive 의 PAT push 가 이 토큰(contents:read)으로 덮여 403 이 남.
          persist-credentials: false

      - name: Checkout wiki (data)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GITHUB_WIKI_REPO || 'aejinyoo/wiki' }}
          token: ${{ secrets.WIKI_REPO_TOKEN }}
          path: wiki
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Install dependencies
        working-directory: wiki-agent
        run: uv sync

      - name: Set WIKI_REPO_PATH
        run: echo "WIKI_REPO_PATH=${{ github.workspace }}/wiki" >> $GITHUB_ENV

      - name: Run nightly batch
        working-directory: wiki-agent
        env:
          GITHUB_TOKEN: ${{ secrets.WIKI_REPO_TOKEN }}
        run: |
          set -e
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ inputs.force_curator }}" = "true" ]; then
            ARGS="$ARGS --force-curator"
          fi
          uv run agents/nightly.py $ARGS

      - name: Commit & push wiki changes
        id: commit
        if: inputs.dry_run != true
        working-directory: wiki
        run: |
          git config user.name "wiki-agent[bot]"
          git config user.email "wiki-agent@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 스킵"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "nightly: ${DATE} 브리프·수집 갱신"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger wiki-site rebuild
        if: steps.commit.outputs.committed == 'true'
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.SITE_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/aejinyoo/wiki-site/dispatches \
            -d '{"event_type":"content-updated"}'         

      - name: Keepalive commit (prevent schedule auto-disable)
        # GH Actions 는 60일간 repo 활동이 없으면 스케줄 워크플로우를 자동 비활성화한다.
        # nightly 는 wiki repo 에만 커밋하므로, wiki-agent 에 매일 타임스탬프 커밋을 남겨 타이머를 리셋한다.
        # 반드시 PAT(WIKI_REPO_TOKEN)로 push — 기본 GITHUB_TOKEN 이 만든 커밋은 60일 타이머를 리셋하지 못한다.
        if: always() && inputs.dry_run != true
        working-directory: wiki-agent
        run: |
          git config user.name "wiki-agent[bot]"
          git config user.email "wiki-agent@users.noreply.github.com"
          mkdir -p .keepalive
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .keepalive/last-run
          git add .keepalive/last-run
          if git diff --cached --quiet; then
            echo "변경 없음 — keepalive 커밋 스킵"
          else
            git commit -m "chore: keepalive $(date -u +%Y-%m-%d)"
            git push "https://x-access-token:${WIKI_REPO_TOKEN}@github.com/aejinyoo/wiki-agent.git" HEAD:main
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-logs
          path: wiki-agent/logs/
          retention-days: 7
